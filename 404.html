<!DOCTYPE html>

    <meta charset="UTF-8">
    <script>
        // GitHub Pages SPA fallback: rewrite /unknown/path to /?/unknown/path so
        // index.html can restore it via history.replaceState. The replace happens
        // before the body paints, so users typically never see this page when the
        // path is actually a valid SPA route (e.g. /contact, /manifest).
        (function (l) {
            var siteRoot = '/';
            var path = l.pathname.slice(siteRoot.length).replace(/&/g, '~and~');
            var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
            l.replace(l.protocol + '//' + l.host + siteRoot + '?/' + path + query + l.hash);
        }(window.location));
    </script>

    <style>
        :root {

            --c-bg: #080808;
            --c-ink: #f5f5f5;
            --c-muted: #888;
            --c-accent: #ff9d00;
            --c-dim: #1f1f1f;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: var(--c-bg);
            color: var(--c-ink);
            font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", sans-serif;

        }
        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(1.5rem, 5vw, 4rem);
        }
        .card {
            width: min(620px, 100%);
            text-align: center;
            border-top: 1px solid var(--c-dim);
            border-bottom: 1px solid var(--c-dim);
            padding: clamp(2rem, 6vw, 4rem) 0;
        }
        .tag {

        }
        h1 {

            letter-spacing: -0.02em;

        p {

        .actions {

        a.btn {

            padding: 0.85rem 1.6rem;

            border-radius: 999px;
            color: var(--c-ink);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        a.btn:hover { border-color: var(--c-accent); color: var(--c-accent); }
