name: who_wants_to_be_smart
description: "A Millionaire-style educational game for Kindergarteners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Local Database ───────────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # ── File System ──────────────────────────────────────────────────────────────
  path_provider: ^2.1.4

  # ── Audio & TTS (wired in Phase 2) ───────────────────────────────────────────
  flutter_tts: ^4.2.0
  just_audio: ^0.10.4

  # ── Networking & DLC (wired in Phase 3) ──────────────────────────────────────
  dio: ^5.7.0
  archive: ^3.6.1

  # ── Animations (wired in Phase 3) ────────────────────────────────────────────
  lottie: ^3.1.3
  confetti: ^0.7.0

  # ── Persistence ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── UI ───────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── App Icon Generator ────────────────────────────────────────────────────
  # Run:  flutter pub run flutter_launcher_icons
  # Requires:  assets/icon/icon.png  (1024×1024, transparent background recommended)
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/animations/
    - assets/lottie/
    - assets/data/
    - assets/icon/

# ── flutter_launcher_icons config ────────────────────────────────────────────
flutter_launcher_icons:
  # Source image (1024×1024 px, PNG, transparent bg recommended)
  image_path: "assets/icon/icon.png"

  android: true
  ios:     true

  # Android adaptive icon (API 26+)
  adaptive_icon_background: "#0A0A2E"   # matches app bgDark
  adaptive_icon_foreground: "assets/icon/icon.png"

  # iOS remove alpha (App Store requirement)
  remove_alpha_ios: true

  # Web (optional — enables PWA icon)
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0A0A2E"
    theme_color:      "#FFD700"

  # Windows (optional)
  windows:
    generate:   true
    image_path: "assets/icon/icon.png"
    icon_size:  48
