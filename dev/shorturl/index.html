<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a short URL with Bob's Shortener.">
    <title>Bob's Shortener</title>
    <style>
        :root {
            --bg: #07090d;
            --bg-soft: #0f141c;
            --panel: rgba(13, 18, 27, 0.86);
            --panel-strong: rgba(9, 13, 20, 0.94);
            --border: rgba(148, 163, 184, 0.16);
            --border-strong: rgba(148, 163, 184, 0.28);
            --text: #f8fafc;
            --muted: #8fa0b8;
            --accent: #7cc7ff;
            --accent-strong: #4daaf7;
            --danger: #ff6b6b;
            --radius-lg: 28px;
            --radius-md: 18px;
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            color-scheme: dark;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            padding: 24px;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 18% 18%, rgba(89, 126, 255, 0.18), transparent 24%),
                radial-gradient(circle at 82% 72%, rgba(0, 188, 212, 0.14), transparent 26%),
                linear-gradient(180deg, #06080c 0%, #090d14 52%, #06080b 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(circle at center, black 35%, transparent 92%);
            opacity: 0.34;
        }

        .shell {
            width: min(100%, 640px);
        }

        .panel {
            position: relative;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background:
                linear-gradient(180deg, rgba(14, 20, 30, 0.95), rgba(10, 14, 22, 0.92)),
                radial-gradient(circle at top right, rgba(124, 199, 255, 0.08), transparent 30%);
            backdrop-filter: blur(22px);
            box-shadow: var(--shadow);
            padding: clamp(1.4rem, 4vw, 2.25rem);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .logo {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: linear-gradient(135deg, #1d4ed8, #38bdf8);
            box-shadow: 0 14px 30px rgba(56, 189, 248, 0.18);
            flex-shrink: 0;
        }

        .title-wrap {
            min-width: 0;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.9rem);
            line-height: 0.98;
            letter-spacing: -0.04em;
            font-weight: 800;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.55;
            max-width: 34rem;
        }

        .form {
            display: grid;
            gap: 1rem;
        }

        .field {
            display: grid;
            gap: 0.65rem;
        }

        label {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.8rem;
            align-items: stretch;
        }

        input[type="text"] {
            width: 100%;
            min-height: 58px;
            padding: 0 1rem;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        input[type="text"]::placeholder {
            color: rgba(248, 250, 252, 0.34);
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(124, 199, 255, 0.42);
            box-shadow: 0 0 0 4px rgba(124, 199, 255, 0.12);
        }

        button {
            font: inherit;
        }

        .primary-btn,
        .copy-btn {
            border: 0;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .primary-btn {
            min-height: 58px;
            padding: 0 1.2rem;
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #74c7ff, #4daaf7);
            color: #06111b;
            font-weight: 800;
            letter-spacing: -0.01em;
            box-shadow: 0 14px 30px rgba(77, 170, 247, 0.22);
            white-space: nowrap;
        }

        .primary-btn:hover {
            transform: translateY(-1px);
        }

        .primary-btn:disabled {
            opacity: 0.65;
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        .message {
            min-height: 1.35rem;
            font-size: 0.92rem;
            color: var(--muted);
            padding-top: 0.15rem;
        }

        .message.error {
            color: var(--danger);
        }

        .result-card {
            margin-top: 1rem;
            padding: 0.95rem;
            border-radius: 22px;
            border: 1px solid rgba(124, 199, 255, 0.16);
            background: rgba(255, 255, 255, 0.04);
            display: none;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.85rem;
            align-items: stretch;
            opacity: 0;
            transform: translateY(8px);
        }

        .result-card.visible {
            display: grid;
            animation: fadeIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .short-link-wrapper {
            min-width: 0;
            padding: 0.55rem 0.65rem;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: grid;
            gap: 0.35rem;
            align-content: center;
        }

        .result-label {
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .short-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.45;
            word-break: break-all;
        }

        .short-link:hover {
            text-decoration: underline;
        }

        .copy-btn {
            min-width: 110px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-weight: 700;
            padding: 0 1rem;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .footer {
            margin-top: 1rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.42);
            font-size: 0.78rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .input-row,
            .result-card {
                grid-template-columns: 1fr;
            }

            .copy-btn,
            .primary-btn {
                min-height: 54px;
            }

            .copy-btn {
                padding: 0.95rem 1rem;
            }
        }
    </style>
</head>
<body>

<div class="shell">
    <main class="panel">
        <header class="header">
            <div class="brand-row">
                <div class="logo" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                </div>
                <div class="title-wrap">
                    <h1>Bob's Shortener</h1>
                </div>
            </div>
            <p class="subtitle">Shorten a destination URL and get a shareable link instantly.</p>
        </header>

        <section class="form" aria-label="URL shortener">
            <div class="field">
                <label for="longUrl">Destination URL</label>
                <div class="input-row">
                    <input type="text" id="longUrl" placeholder="https://example.com" autofocus>
                    <button class="primary-btn" id="shortenBtn" type="button" onclick="shorten()">Shorten URL</button>
                </div>
            </div>

            <div class="message" id="message"></div>

            <div class="result-card" id="resultCard">
                <div class="short-link-wrapper">
                    <span class="result-label">Short link</span>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="short-link" id="shortLink"></a>
                </div>
                <button class="copy-btn" id="copyBtn" type="button" onclick="copyToClipboard()">Copy</button>
            </div>
        </section>
    </main>

    <p class="footer">&copy; 2026 Bob's Services. All rights reserved.</p>
</div>

<script>
    const API_URL = "https://go.bobsnadenica.com";

    const shortenBtn = document.getElementById("shortenBtn");
    const copyBtn = document.getElementById("copyBtn");
    const messageEl = document.getElementById("message");
    const resultCard = document.getElementById("resultCard");
    const shortLinkEl = document.getElementById("shortLink");
    const longUrlInput = document.getElementById("longUrl");

    async function shorten() {
        const url = longUrlInput.value.trim();

        messageEl.textContent = "";
        messageEl.className = "message";
        resultCard.classList.remove("visible");

        if (!url) {
            showError("Please enter a valid URL.");
            return;
        }

        setLoading(true);

        try {
            const cleanApi = API_URL.replace(/\/$/, "");
            const res = await fetch(`${cleanApi}/create`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url })
            });

            if (!res.ok) throw new Error("Server error");

            const data = await res.json();
            shortLinkEl.href = data.shortUrl;
            shortLinkEl.textContent = data.shortUrl;
            resultCard.classList.add("visible");
            longUrlInput.value = "";
        } catch (e) {
            console.error(e);
            showError("Failed to create link. Please try again.");
        } finally {
            setLoading(false);
        }
    }

    function setLoading(isLoading) {
        if (isLoading) {
            shortenBtn.disabled = true;
            shortenBtn.textContent = "Processing...";
        } else {
            shortenBtn.disabled = false;
            shortenBtn.textContent = "Shorten URL";
        }
    }

    function showError(msg) {
        messageEl.textContent = msg;
        messageEl.classList.add("error");
    }

    function copyToClipboard() {
        const url = shortLinkEl.textContent;
        navigator.clipboard.writeText(url).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "Copied";
            setTimeout(() => {
                copyBtn.textContent = originalText;
            }, 1800);
        });
    }

    longUrlInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") shorten();
    });
</script>

</body>
</html>
