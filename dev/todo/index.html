<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Visualization</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .category {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .category h2 {
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            color: #2980b9;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        li:last-child {
            border-bottom: none;
        }
        li::before {
            content: "•";
            color: #3498db;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>My Todo List</h1>
    <div id="todo-container">Loading...</div>

    <script>
        async function fetchAndRenderTodo() {
            const container = document.getElementById('todo-container');
            try {
                const response = await fetch('todo.txt');
                if (!response.ok) {
                    throw new Error('Failed to load todo.txt');
                }
                const text = await response.text();
                const categories = parseTodo(text);
                renderTodo(categories);
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}<br>Make sure you are serving this file via a web server.</div>`;
            }
        }

        function parseTodo(text) {
            const sections = text.split(/={5,}/);
            const categories = [];

            sections.forEach(section => {
                const lines = section.trim().split('\n').filter(line => line.trim() !== '');
                if (lines.length > 0) {
                    const title = lines[0].trim();
                    const items = lines.slice(1).map(line => line.replace(/^-/, '').trim());
                    categories.push({ title, items });
                }
            });

            return categories;
        }

        function renderTodo(categories) {
            const container = document.getElementById('todo-container');
            container.innerHTML = '';

            categories.forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';

                const h2 = document.createElement('h2');
                h2.textContent = category.title;
                categoryDiv.appendChild(h2);

                if (category.items.length > 0) {
                    const ul = document.createElement('ul');
                    category.items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        ul.appendChild(li);
                    });
                    categoryDiv.appendChild(ul);
                }

                container.appendChild(categoryDiv);
            });
        }

        fetchAndRenderTodo();
    </script>
</body>
</html>
