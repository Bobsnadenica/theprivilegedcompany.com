<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Russian Roulette Liar's Deck logo</title>
  <desc id="desc">A noir card-table emblem with cards and a roulette chamber.</desc>
  <defs>
    <linearGradient id="bg" x1="42" y1="20" x2="278" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#25130d"/>
      <stop offset=".52" stop-color="#0f0b0b"/>
      <stop offset="1" stop-color="#30150d"/>
    </linearGradient>
    <linearGradient id="gold" x1="78" y1="80" x2="250" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe39a"/>
      <stop offset=".48" stop-color="#d99a38"/>
      <stop offset="1" stop-color="#7b3a1b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="320" rx="58" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="118" fill="none" stroke="#6b3820" stroke-width="10"/>
  <circle cx="160" cy="160" r="104" fill="none" stroke="url(#gold)" stroke-width="4" opacity=".9"/>
  <g transform="rotate(-13 160 160)">
    <rect x="96" y="72" width="86" height="128" rx="12" fill="#f6e6c2" stroke="#4c2417" stroke-width="5"/>
    <rect x="138" y="84" width="86" height="128" rx="12" fill="#181111" stroke="#d79a3d" stroke-width="5"/>
    <path d="M127 126c9-15 25-15 34 0-8 15-26 15-34 0Z" fill="#9d1d22"/>
    <path d="M162 137l-19 31h38l-19-31Z" fill="#9d1d22"/>
    <text x="181" y="158" fill="#f9d98b" font-family="Georgia,serif" font-size="48" font-weight="700" text-anchor="middle">A</text>
  </g>
  <g filter="url(#glow)">
    <circle cx="160" cy="196" r="42" fill="#151010" stroke="url(#gold)" stroke-width="7"/>
    <circle cx="160" cy="196" r="15" fill="#422016" stroke="#f7cf75" stroke-width="4"/>
    <g fill="#ffd46e">
      <circle cx="160" cy="162" r="8"/>
      <circle cx="189" cy="179" r="8"/>
      <circle cx="189" cy="213" r="8"/>
      <circle cx="160" cy="230" r="8"/>
      <circle cx="131" cy="213" r="8"/>
      <circle cx="131" cy="179" r="8"/>
    </g>
    <circle cx="131" cy="179" r="6" fill="#b82828"/>
  </g>
  <text x="160" y="272" fill="#ffe09a" font-family="Arial,sans-serif" font-size="30" font-weight="900" letter-spacing="2" text-anchor="middle">LIAR'S DECK</text>
</svg>
